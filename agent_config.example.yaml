agents:
  spec:
    agent_id: ""
    api_key: ""
  coder:
    agent_id: ""
    api_key: ""
  tester:
    agent_id: ""
    api_key: ""
  repairer:
    agent_id: ""
    api_key: ""
  # The conductor is a scripted Agent-API client (not an LLM agent). Register a 5th agent named
  # "Conductor" in the dashboard and put its agent id + agent API key here.
  conductor:
    agent_id: ""
    api_key: ""

# The agent api_keys above (band_...) authenticate the agents to the Band chat room. They are NOT
# model-inference keys. To run the four agents on the aimlapi provider, put your aimlapi inference
# key here (from aimlapi.com) - it is read by orchestrator.config.aimlapi_key(). Alternatively set
# AIML_API_KEY in .env; the env var wins if both are present. Leave blank to run agents locally.
#
# Inference keys for the cloud providers (groq, aimlapi, openai_compatible) are normally entered from
# the dashboard ("Build your stack") and saved to orchestrator/provider_keys.json (gitignored), NOT
# here. This file's aiml_api_key is only a fallback so aimlapi can also be configured from one place.
aiml_api_key: ""
